[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "T20", # flake8-print
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate
    "PL",  # pylint
    "TRY", # tryceratops
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "SIM117", # prefer `a and b` over `a if a else b`
    "PLC0415", # lazy imports to avoid circular deps
    "PLR0913", # too many args - needed for FastAPI endpoints
    "ARG001",  # unused args - FastAPI/limiter requires params
    "ARG002",  # unused method args - interface compatibility
    "PLR2004", # magic value comparisons
    "TRY003",  # exception message length
    "PLR0915", # too many statements
    "B905",    # zip without strict
    "SIM108",  # ternary over if-else
    "TRY301",  # abstract raise to function
    "B904",    # raise from in except - intentional pattern
    "TRY300",  # return in try vs else - readability preference
    "TRY400",  # logging.exception vs logging.error - acceptable
    "TRY401",  # logging.exception vs logging.error - acceptable
    "E402",    # module level import ordering
    "PLW0603", # global statement needed for singleton pattern
    "N818",    # exception naming - back compat
    "N802",    # function naming convention
    "E722",    # bare except - intentional fallback
]
per-file-ignores = {"tests/*" = ["S101", "S106", "ARG002", "F841", "PLC0415"], "alembic/*" = ["E501", "S101"]}

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
sqlalchemy = true
plugins = ["pydantic.mypy"]
exclude = ["venv", ".venv", "build", "dist"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --strict-markers --tb=short"
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "tests/*",
    "alembic/*",
    "*/venv/*",
    "*/.venv/*"
]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]